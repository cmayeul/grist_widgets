<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EUR/USD Rate Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9f9f9;
    }
    #card {
      background: white;
      border-radius: 10px;
      padding: 24px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      text-align: center;
      min-width: 220px;
    }
    #label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
      margin-bottom: 8px;
    }
    #rate {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -.02em;
    }
    #date-display { font-size: 12px; color: #aaa; margin-top: 6px; }
    #status { margin-top: 14px; font-size: 12px; min-height: 18px; }
    #status.loading { color: #888; }
    #status.ok      { color: #2a7a4b; }
    #status.skip    { color: #aaa; }
    #status.error   { color: #c8502a; }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ddd;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="card">
  <div id="label">EUR / USD</div>
  <div id="rate">—</div>
  <div id="date-display"></div>
  <div id="status" class="skip">En attente…</div>
</div>

<script>
  /* ── État ───────────────────────────────────────────── */
  let tableId  = null;
  let snapshot = {};
  // snapshot = { [recordId]: { date: valeur_brute, rate: valeur } }

  /* ── UI ─────────────────────────────────────────────── */
  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + (type || 'ok');
    el.innerHTML = msg;
  }

  function setRate(value, dateStr) {
    document.getElementById('rate').textContent =
      (value != null && value !== '') ? Number(value).toFixed(4) : '—';
    document.getElementById('date-display').textContent = dateStr || '';
  }

  /* ── Formater timestamp Grist → YYYY-MM-DD ──────────── */
  function formatDate(raw) {
    if (!raw && raw !== 0) return null;
    if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    if (typeof raw === 'number') {
      const d    = new Date(raw * 1000);
      const yyyy = d.getUTCFullYear();
      const mm   = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd   = String(d.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    return null;
  }

  /* ── API Frankfurter ────────────────────────────────── */
  async function fetchRate(dateStr) {
    const res = await fetch(
      `https://api.frankfurter.dev/${dateStr}?from=EUR&to=USD`
    );
    if (!res.ok) throw new Error(`Erreur API ${res.status}`);
    const data = await res.json();
    if (!data.rates || !data.rates.USD)
      throw new Error('Taux USD absent de la réponse');
    return { rate: data.rates.USD, date: data.date };
  }

  /* ── Écriture dans Grist ────────────────────────────── */
  async function writeRate(recordId, rate) {
    // On utilise la colonne mappée "Rate" via applyUserActions.
    // mapColumnNames() nous a déjà donné la valeur normalisée,
    // mais pour écrire on a besoin du vrai colId Grist —
    // grist.mapColumnNamesBack() fait la conversion inverse.
    await grist.docApi.applyUserActions([
      ['UpdateRecord', tableId, recordId,
        grist.mapColumnNamesBack({ Rate: rate })
      ]
    ]);
  }

  /* ── onRecords : maintenir le snapshot ──────────────── */
  // Appelé avant onRecord à chaque changement.
  // On stocke l'état précédent de toutes les lignes.
  grist.onRecords((records, mappings) => {
    const next = {};
    for (const r of records) {
      // mapColumnNames normalise les noms selon le mapping utilisateur
      const mapped = grist.mapColumnNames(r, mappings);
      if (!mapped) continue;
      next[r.id] = {
        date: mapped.Date,
        rate: mapped.Rate,
      };
    }
    snapshot = next;
  });

  /* ── onRecord : logique principale ─────────────────── */
  grist.onRecord(async (record, mappings) => {
    if (!record) {
      setStatus('Aucune ligne sélectionnée.', 'skip');
      setRate(null, null);
      return;
    }

    // Récupérer l'id de la table (mis en cache)
    if (!tableId) {
      tableId = await grist.getSelectedTableId();
    }

    // mapColumnNames retourne null si le mapping est incomplet
    const mapped = grist.mapColumnNames(record, mappings);
    if (!mapped) {
      setStatus(
        'Configurez les colonnes Date et Rate dans le panneau du widget.',
        'error'
      );
      return;
    }

    const rawDate     = mapped.Date;
    const currentRate = mapped.Rate;
    const dateStr     = formatDate(rawDate);

    // Afficher l'état courant immédiatement
    setRate(currentRate || null, dateStr);

    // Pas de date → rien à faire
    if (!dateStr) {
      setStatus('Aucune date dans cette ligne.', 'skip');
      return;
    }

    // Détecter création ou changement de date via le snapshot
    const prev        = snapshot[record.id];
    const isNewRecord = !prev;
    const dateChanged = prev && formatDate(prev.date) !== dateStr;

    if (!isNewRecord && !dateChanged) {
      setStatus(
        currentRate ? 'Taux à jour.' : 'Date inchangée — taux non recalculé.',
        'skip'
      );
      return;
    }

    // Appel API uniquement si nouvelle ligne ou date modifiée
    const reason = isNewRecord ? 'nouvelle ligne' : 'date modifiée';
    setStatus(
      '<span class="spinner"></span>Récupération (' + reason + ')…',
      'loading'
    );

    try {
      const { rate, date } = await fetchRate(dateStr);
      await writeRate(record.id, rate);
      setRate(rate, date);
      setStatus('✓ Taux mis à jour (' + reason + ').', 'ok');
    } catch (e) {
      setStatus('Erreur : ' + e.message, 'error');
      console.error(e);
    }
  });

  /* ── Initialisation ─────────────────────────────────── */
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'Date', type: 'Date',    title: 'Colonne date' },
      { name: 'Rate', type: 'Numeric', title: 'Colonne taux EUR/USD' },
    ]
  });
</script>
</body>
</html>
