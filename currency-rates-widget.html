<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EUR/USD Rate Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9f9f9;
      padding: 16px;
    }
    #card {
      background: white;
      border-radius: 10px;
      padding: 24px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      text-align: center;
      min-width: 220px;
      width: 100%;
      max-width: 400px;
    }
    #label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
      margin-bottom: 8px;
    }
    #rate {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -.02em;
    }
    #date-display { font-size: 12px; color: #aaa; margin-top: 6px; }
    #status { margin-top: 14px; font-size: 12px; min-height: 18px; }
    #status.loading { color: #888; }
    #status.ok      { color: #2a7a4b; }
    #status.skip    { color: #aaa; }
    #status.error   { color: #c8502a; }

    /* ── Debug panel ── */
    #debug {
      margin-top: 16px;
      width: 100%;
      max-width: 400px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: monospace;
      font-size: 11px;
      color: #7ec8e3;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #debug-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #666;
      margin-bottom: 6px;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ddd;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="card">
  <div id="label">EUR / USD</div>
  <div id="rate">—</div>
  <div id="date-display"></div>
  <div id="status" class="skip">En attente…</div>
</div>

<div id="debug-title">Debug — valeurs brutes reçues de Grist</div>
<div id="debug">En attente d'un enregistrement…</div>

<script>
  /* ── État ───────────────────────────────────────────── */
  let tableId  = null;
  let snapshot = {};

  /* ── Debug ──────────────────────────────────────────── */
  function debug(obj) {
    document.getElementById('debug').textContent =
      JSON.stringify(obj, null, 2);
  }

  /* ── UI ─────────────────────────────────────────────── */
  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + (type || 'ok');
    el.innerHTML = msg;
  }

  function setRate(value, dateStr) {
    document.getElementById('rate').textContent =
      (value != null && value !== '') ? Number(value).toFixed(4) : '—';
    document.getElementById('date-display').textContent = dateStr || '';
  }

  /* ── Formater une date vers YYYY-MM-DD ──────────────────
     Grist peut transmettre les dates de plusieurs façons :
     - timestamp en secondes (number)
     - chaîne ISO "2026-03-01"
     - chaîne avec heure "2026-03-01T00:00:00Z"
     On gère tous les cas.                                */
  function formatDate(raw) {
    if (raw == null || raw === '' || raw === false) return null;

    // Nombre : timestamp en secondes depuis epoch
    if (typeof raw === 'number') {
      if (raw === 0) return null;
      const d = new Date(raw * 1000);
      const yyyy = d.getUTCFullYear();
      const mm   = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd   = String(d.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    // Chaîne : extraire la partie YYYY-MM-DD quelle que soit la forme
    if (typeof raw === 'string') {
      const match = raw.match(/(\d{4}-\d{2}-\d{2})/);
      return match ? match[1] : null;
    }

    return null;
  }

  /* ── API Frankfurter ────────────────────────────────── */
  async function fetchRate(dateStr) {
    const res = await fetch(
      `https://api.frankfurter.dev/${dateStr}?from=EUR&to=USD`
    );
    if (!res.ok) throw new Error(`Erreur API ${res.status}`);
    const data = await res.json();
    if (!data.rates || !data.rates.USD)
      throw new Error('Taux USD absent de la réponse');
    return { rate: data.rates.USD, date: data.date };
  }

  /* ── Écriture dans Grist ────────────────────────────── */
  async function writeRate(recordId, rate) {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', tableId, recordId,
        grist.mapColumnNamesBack({ Rate: rate })
      ]
    ]);
  }

  /* ── onRecords : snapshot ───────────────────────────── */
  grist.onRecords((records, mappings) => {
    const next = {};
    for (const r of records) {
      const mapped = grist.mapColumnNames(r, mappings);
      if (!mapped) continue;
      next[r.id] = { date: mapped.Date, rate: mapped.Rate };
    }
    snapshot = next;
  });

  /* ── onRecord : logique principale ─────────────────── */
  grist.onRecord(async (record, mappings) => {
    if (!record) {
      setStatus('Aucune ligne sélectionnée.', 'skip');
      setRate(null, null);
      debug({ record: null });
      return;
    }

    if (!tableId) tableId = await grist.getSelectedTableId();

    // ── Afficher TOUTES les valeurs brutes pour le debug ──
    debug({
      record_id:   record.id,
      record_raw:  record,
      mappings:    mappings,
      snapshot_prev: snapshot[record.id] || null,
    });

    const mapped = grist.mapColumnNames(record, mappings);
    if (!mapped) {
      setStatus(
        'Configurez les colonnes Date et Rate dans le panneau du widget.',
        'error'
      );
      return;
    }

    const rawDate     = mapped.Date;
    const currentRate = mapped.Rate;
    const dateStr     = formatDate(rawDate);

    // Afficher aussi les valeurs après mapping
    debug({
      record_id:    record.id,
      raw_date:     rawDate,
      raw_date_type: typeof rawDate,
      formatted_date: dateStr,
      current_rate: currentRate,
      mappings:     mappings,
      snapshot_prev: snapshot[record.id] || null,
    });

    setRate(currentRate || null, dateStr);

    if (!dateStr) {
      setStatus(
        `Aucune date — valeur brute reçue : "${rawDate}" (${typeof rawDate})`,
        'skip'
      );
      return;
    }

    const prev        = snapshot[record.id];
    const isNewRecord = !prev;
    const dateChanged = prev && formatDate(prev.date) !== dateStr;

    if (!isNewRecord && !dateChanged) {
      setStatus(
        currentRate ? 'Taux à jour.' : 'Date inchangée — taux non recalculé.',
        'skip'
      );
      return;
    }

    const reason = isNewRecord ? 'nouvelle ligne' : 'date modifiée';
    setStatus(
      '<span class="spinner"></span>Récupération (' + reason + ')…',
      'loading'
    );

    try {
      const { rate, date } = await fetchRate(dateStr);
      await writeRate(record.id, rate);
      setRate(rate, date);
      setStatus('✓ Taux mis à jour (' + reason + ').', 'ok');
    } catch (e) {
      setStatus('Erreur : ' + e.message, 'error');
      console.error(e);
    }
  });

  /* ── Initialisation ─────────────────────────────────── */
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'Date', type: 'Date',    title: 'Colonne date' },
      { name: 'Rate', type: 'Numeric', title: 'Colonne taux EUR/USD' },
    ]
  });
</script>
</body>
</html>
