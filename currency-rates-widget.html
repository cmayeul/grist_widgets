<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EUR/USD Rate Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f9f9f9;
    }
    #card {
      background: white;
      border-radius: 10px;
      padding: 24px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      text-align: center;
      min-width: 220px;
    }
    #label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
      margin-bottom: 8px;
    }
    #rate {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -.02em;
    }
    #date-display { font-size: 12px; color: #aaa; margin-top: 6px; }
    #status { margin-top: 14px; font-size: 12px; min-height: 18px; }
    #status.loading { color: #888; }
    #status.ok      { color: #2a7a4b; }
    #status.skip    { color: #aaa; }
    #status.error   { color: #c8502a; }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #ddd;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="card">
  <div id="label">EUR / USD</div>
  <div id="rate">—</div>
  <div id="date-display"></div>
  <div id="status" class="skip">En attente…</div>
</div>

<script>
  /* ── Configuration par défaut des colonnes ─────────────
     Ces noms sont utilisés si l'utilisateur ne configure
     pas de mapping dans le panneau Grist du widget.      */
  const COL_DATE = 'date';
  const COL_RATE = 'EURUSD';

  /* ── État interne ───────────────────────────────────── */
  let tableId  = null;
  let snapshot = {};
  // snapshot = { [recordId]: { date: valeur_brute, eurusd: valeur } }
  // mis à jour par onRecords, lu par onRecord pour détecter les changements

  /* ── Helpers UI ─────────────────────────────────────── */
  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + (type || 'ok');
    el.innerHTML = msg;
  }

  function setRate(value, dateStr) {
    document.getElementById('rate').textContent =
      (value != null && value !== '') ? Number(value).toFixed(4) : '—';
    document.getElementById('date-display').textContent = dateStr || '';
  }

  /* ── Formater une date Grist → YYYY-MM-DD ───────────────
     Grist stocke les dates sous forme de timestamp en
     secondes depuis l'epoch UTC (entier).                */
  function formatDate(raw) {
    if (!raw && raw !== 0) return null;
    if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    if (typeof raw === 'number') {
      const d = new Date(raw * 1000);
      const yyyy = d.getUTCFullYear();
      const mm   = String(d.getUTCMonth() + 1).padStart(2, '0');
      const dd   = String(d.getUTCDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }
    return null;
  }

  /* ── Appel API Frankfurter ──────────────────────────── */
  async function fetchRate(dateStr) {
    const url = `https://api.frankfurter.dev/${dateStr}?from=EUR&to=USD`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Erreur API ${res.status}`);
    const data = await res.json();
    if (!data.rates || !data.rates.USD) throw new Error('Taux USD absent de la réponse');
    return { rate: data.rates.USD, date: data.date };
  }

  /* ── Écriture du taux dans Grist ────────────────────── */
  async function writeRate(recordId, colRate, rate) {
    await grist.docApi.applyUserActions([
      ['UpdateRecord', tableId, recordId, { [colRate]: rate }]
    ]);
  }

  /* ── onRecords : maintenir le snapshot ──────────────── */
  // Grist appelle onRecords avant onRecord à chaque changement.
  // On stocke l'état de TOUTES les lignes pour pouvoir comparer.
  grist.onRecords((records, mappings) => {
    const next = {};
    for (const r of records) {
      const colDate = (mappings && mappings.Date) || COL_DATE;
      const colRate = (mappings && mappings.Rate) || COL_RATE;
      next[r.id] = {
        date:  r[colDate],
        eurusd: r[colRate],
      };
    }
    snapshot = next;
  });

  /* ── onRecord : logique principale ─────────────────── */
  grist.onRecord(async (record, mappings) => {
    if (!record) {
      setStatus('Aucune ligne sélectionnée.', 'skip');
      setRate(null, null);
      return;
    }

    // Récupérer l'id de la table courante
    if (!tableId) {
      tableId = await grist.getSelectedTableId();
    }

    // Résoudre les noms de colonnes (mapping ou défaut)
    const colDate = (mappings && mappings.Date) || COL_DATE;
    const colRate = (mappings && mappings.Rate) || COL_RATE;

    const rawDate     = record[colDate];
    const currentRate = record[colRate];
    const dateStr     = formatDate(rawDate);

    // Afficher l'état courant immédiatement
    setRate(currentRate || null, dateStr);

    // Pas de date → rien à faire
    if (!dateStr) {
      setStatus('Aucune date dans cette ligne.', 'skip');
      return;
    }

    // Comparer avec le snapshot pour détecter création / changement
    const prev        = snapshot[record.id];
    const isNewRecord = !prev;
    const dateChanged = prev && formatDate(prev.date) !== dateStr;

    if (!isNewRecord && !dateChanged) {
      // Simple navigation ou autre colonne modifiée → ne rien faire
      setStatus(
        currentRate ? 'Taux à jour.' : 'Date inchangée — taux non recalculé.',
        'skip'
      );
      return;
    }

    // Nouvelle ligne ou date modifiée → appel API
    const reason = isNewRecord ? 'nouvelle ligne' : 'date modifiée';
    setStatus(
      '<span class="spinner"></span>Récupération du taux (' + reason + ')…',
      'loading'
    );

    try {
      const { rate, date } = await fetchRate(dateStr);
      await writeRate(record.id, colRate, rate);
      setRate(rate, date);
      setStatus('✓ Taux mis à jour (' + reason + ').', 'ok');
    } catch (e) {
      setStatus('Erreur : ' + e.message, 'error');
      console.error(e);
    }
  });

  /* ── Initialisation ─────────────────────────────────── */
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'Date', type: 'Date',    title: 'Colonne date' },
      { name: 'Rate', type: 'Numeric', title: 'Colonne taux EUR/USD' },
    ]
  });
</script>
</body>
</html>
