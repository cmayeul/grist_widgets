<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grist Form – Debug</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body { font-family: sans-serif; font-size: 14px; padding: 16px; background: #f5f5f5; }
    h2   { font-size: 15px; margin-bottom: 16px; }

    .field { margin-bottom: 12px; }
    label  { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; text-transform: uppercase; }
    input, select, textarea {
      width: 100%; padding: 7px 9px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 14px; font-family: sans-serif;
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #2f6fef;
    }
    input.invalid, select.invalid { border-color: #c0392b !important; background: #fff8f8 !important; }

    .field-error {
      display: none; margin-top: 4px;
      font-size: 11px; color: #c0392b;
    }
    .field-error.visible { display: block; }

    button {
      margin-top: 8px; padding: 8px 20px;
      background: #2f6fef; color: #fff;
      border: none; border-radius: 4px;
      font-size: 14px; cursor: pointer;
    }
    button:hover    { background: #1d5cd4; }
    button:disabled { background: #aaa; cursor: default; }

    #msg { margin-top: 12px; padding: 8px 12px; border-radius: 4px; display: none; font-size: 13px; }
    #msg.ok  { background: #e6f9ee; color: #1e7e3e; border: 1px solid #b7e8cc; display: block; }
    #msg.err { background: #fde8e6; color: #c0392b; border: 1px solid #f5c4c0; display: block; }

    #log {
      margin-top: 20px; padding: 10px;
      background: #1e1e1e; color: #d4d4d4;
      font-family: monospace; font-size: 11px;
      border-radius: 4px; max-height: 200px;
      overflow-y: auto; white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2 id="form-title">Chargement…</h2>
<div id="form-fields"></div>
<button id="btn-submit" disabled>Envoyer</button>
<div id="msg"></div>
<div id="log"></div>

<script>
// ── Debug log ──────────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(...args) {
  const line = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
  logEl.textContent += line + '\n';
  logEl.scrollTop = logEl.scrollHeight;
  console.log(...args);
}

// ── State ──────────────────────────────────────────────────────────────────
let currentTable = null;
let schema = [];   // [{ id, label, type, choices, refTable, refLabel }]

// ── Type map Grist → input HTML ────────────────────────────────────────────
const TYPE_MAP = {
  'Text':         'text',
  'Numeric':      'number',
  'Int':          'number',
  'Date':         'date',
  'DateTime':     'datetime-local',
  'Bool':         'checkbox',
  'Choice':       'select',
  'ChoiceList':   'select',   // multi
  'Reference':    'select',
  'ReferenceList':'select',   // multi
  'Attachments':  null,       // ignoré pour l'instant
};

// ── Validation rules par type Grist ───────────────────────────────────────
// Chaque entrée : { test(value, field) → bool, message(field) → string }
const VALIDATORS = {
  'Int': [
    {
      test: v => v === '' || Number.isInteger(Number(v)),
      message: f => `${f.label} doit être un nombre entier`,
    },
    {
      test: v => v === '' || !isNaN(Number(v)),
      message: f => `${f.label} : valeur numérique requise`,
    },
  ],
  'Numeric': [
    {
      test: v => v === '' || !isNaN(Number(v)),
      message: f => `${f.label} doit être un nombre (ex: 42.5)`,
    },
  ],
  'Date': [
    {
      test: v => v === '' || !isNaN(Date.parse(v)),
      message: f => `${f.label} : date invalide`,
    },
  ],
  'DateTime': [
    {
      test: v => v === '' || !isNaN(Date.parse(v)),
      message: f => `${f.label} : date/heure invalide`,
    },
  ],
  // Email détecté par le nom de la colonne
  '_email': [
    {
      test: v => v === '' || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
      message: f => `${f.label} : adresse e-mail invalide`,
    },
  ],
  // URL détecté par le nom de la colonne
  '_url': [
    {
      test: v => { try { if (v === '') return true; new URL(v); return true; } catch { return false; } },
      message: f => `${f.label} : URL invalide (ex: https://exemple.com)`,
    },
  ],
  // Téléphone détecté par le nom de la colonne
  '_phone': [
    {
      test: v => v === '' || /^[+\d\s\-().]{6,20}$/.test(v),
      message: f => `${f.label} : numéro de téléphone invalide`,
    },
  ],
};

// Heuristique : deviner un validateur supplémentaire depuis le nom de la colonne
function guessSemanticType(colId, label) {
  const s = (colId + ' ' + label).toLowerCase();
  if (/email|e-mail|courriel|mail/.test(s))   return '_email';
  if (/url|site|web|http|lien|link/.test(s))  return '_url';
  if (/phone|tel|mobile|portable|fax/.test(s)) return '_phone';
  return null;
}

// Retourne la liste des règles applicables à un champ
function getRules(field) {
  const rules = [...(VALIDATORS[field.gristType] ?? [])];
  const semantic = guessSemanticType(field.id, field.label);
  if (semantic) rules.push(...(VALIDATORS[semantic] ?? []));
  return rules;
}

// Valide un champ unique → { valid, message }
function validateField(field, rawValue) {
  // Champ requis
  const isEmpty = rawValue === '' || rawValue === null || rawValue === undefined;
  if (field.required && isEmpty) {
    return { valid: false, message: `${field.label} est obligatoire` };
  }
  if (isEmpty) return { valid: true, message: '' };

  for (const rule of getRules(field)) {
    if (!rule.test(rawValue, field)) {
      return { valid: false, message: rule.message(field) };
    }
  }
  return { valid: true, message: '' };
}

// Affiche / efface l'erreur sur un champ
function setFieldError(inputEl, errorEl, message) {
  if (message) {
    inputEl.classList.add('invalid');
    errorEl.textContent = message;
    errorEl.classList.add('visible');
  } else {
    inputEl.classList.remove('invalid');
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
  }
}

// Valide tout le formulaire → true si valide
function validateAll() {
  let allValid = true;
  for (const field of schema) {
    const inputEl = document.getElementById('field-' + field.id);
    const errorEl = document.getElementById('error-' + field.id);
    if (!inputEl || !errorEl) continue;

    const raw = inputEl.type === 'checkbox' ? '' : inputEl.value;
    const { valid, message } = validateField(field, raw);
    setFieldError(inputEl, errorEl, valid ? '' : message);
    if (!valid) allValid = false;
  }
  return allValid;
}

// ── Build schema from Grist metadata ──────────────────────────────────────
async function buildSchema(tableName, visibleCols) {
  log('buildSchema', tableName, visibleCols);

  const [tables, columns] = await Promise.all([
    grist.docApi.fetchTable('_grist_Tables'),
    grist.docApi.fetchTable('_grist_Tables_column'),
  ]);

  const tIdx = tables.tableId.indexOf(tableName);
  if (tIdx === -1) { log('Table introuvable:', tableName); return []; }
  const tRef = tables.id[tIdx];

  const result = [];

  for (const colId of visibleCols) {
    // Find column index in metadata
    let ci = -1;
    for (let i = 0; i < columns.colId.length; i++) {
      if (columns.parentId[i] === tRef && columns.colId[i] === colId) {
        ci = i; break;
      }
    }
    if (ci === -1) { log('Colonne introuvable dans metadata:', colId); continue; }

    const rawType = columns.type[ci] || 'Text';
    const htmlType = TYPE_MAP[rawType];
    if (htmlType === null) { log('Colonne ignorée (type non supporté):', colId, rawType); continue; }

    let opts = {};
    try { opts = JSON.parse(columns.widgetOptions[ci] || '{}'); } catch(e) {}

    const field = {
      id:        colId,
      label:     columns.label[ci] || colId,
      gristType: rawType,
      type:      htmlType || 'text',
      choices:   opts.choices ?? [],
      multiple:  rawType === 'ChoiceList' || rawType === 'ReferenceList',
      refTable:  rawType.startsWith('Ref:') ? rawType.replace('Ref:', '') : null,
      refLabel:  opts.visibleCol ?? null,
      required:  !columns.isFormula[ci] && columns.formula[ci] === '',
    };

    // Load reference options
    if (field.refTable) {
      try {
        const refData = await grist.docApi.fetchTable(field.refTable);
        const labelCol = field.refLabel && refData[field.refLabel]
          ? field.refLabel
          : Object.keys(refData).find(k => k !== 'id') ?? 'id';
        field.choices = refData.id.map((id, i) => ({
          value: id,
          label: String(refData[labelCol][i] ?? id),
        }));
        log('Ref options chargées pour', colId, ':', field.choices.length, 'entrées');
      } catch(e) {
        log('Erreur chargement ref', field.refTable, ':', e.message);
      }
    } else if (field.choices.length && typeof field.choices[0] === 'string') {
      // Normalize Choice strings → { value, label }
      field.choices = field.choices.map(c => ({ value: c, label: c }));
    }

    result.push(field);
    const rules = getRules(field);
    const semantic = guessSemanticType(field.id, field.label);
    log('Champ ajouté:', colId, rawType, '->', field.type,
        rules.length ? `| ${rules.length} règle(s)` : '',
        semantic ? `| sémantique: ${semantic}` : '',
        field.required ? '| requis' : '');
  }

  return result;
}

// ── Render form from schema ────────────────────────────────────────────────
function renderForm(fields, tableName) {
  document.getElementById('form-title').textContent = tableName || 'Formulaire';
  const container = document.getElementById('form-fields');
  container.innerHTML = '';

  if (!fields.length) {
    container.innerHTML = '<p style="color:#888">Aucun champ à afficher.</p>';
    document.getElementById('btn-submit').disabled = true;
    return;
  }

  for (const field of fields) {
    const div = document.createElement('div');
    div.className = 'field';

    const label = document.createElement('label');
    label.textContent = field.label;
    label.setAttribute('for', 'field-' + field.id);
    div.appendChild(label);

    let input;

    if (field.type === 'select') {
      input = document.createElement('select');
      if (field.multiple) input.multiple = true;

      // Blank option for single selects
      if (!field.multiple) {
        const blank = document.createElement('option');
        blank.value = '';
        blank.textContent = '— Choisir —';
        input.appendChild(blank);
      }

      for (const opt of field.choices) {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        input.appendChild(option);
      }
    } else if (field.type === 'checkbox') {
      input = document.createElement('input');
      input.type = 'checkbox';
      input.style.width = 'auto';
    } else {
      input = document.createElement('input');
      input.type = field.type;
      input.placeholder = field.label;
    }

    input.id = 'field-' + field.id;
    input.dataset.fieldId = field.id;
    input.dataset.gristType = field.gristType;
    input.dataset.multiple = field.multiple ? 'true' : 'false';

    // Marquer requis visuellement
    if (field.required) {
      label.innerHTML += ' <span style="color:#c0392b" title="Obligatoire">*</span>';
    }

    // Élément d'erreur inline
    const errorEl = document.createElement('div');
    errorEl.className = 'field-error';
    errorEl.id = 'error-' + field.id;

    // Validation live à la sortie du champ
    input.addEventListener('blur', () => {
      const raw = input.type === 'checkbox' ? '' : input.value;
      const { valid, message } = validateField(field, raw);
      setFieldError(input, errorEl, valid ? '' : message);
    });
    // Effacer l'erreur dès que l'utilisateur retape
    input.addEventListener('input', () => {
      if (input.classList.contains('invalid')) {
        input.classList.remove('invalid');
        errorEl.classList.remove('visible');
      }
    });

    div.appendChild(input);
    div.appendChild(errorEl);
    container.appendChild(div);
  }

  document.getElementById('btn-submit').disabled = false;
}

// ── Collect form values ────────────────────────────────────────────────────
function collectValues() {
  const data = {};
  const inputs = document.querySelectorAll('[data-field-id]');

  for (const input of inputs) {
    const id = input.dataset.fieldId;
    const gristType = input.dataset.gristType;
    const isMultiple = input.dataset.multiple === 'true';

    let value;

    if (input.type === 'checkbox') {
      value = input.checked;
    } else if (input.tagName === 'SELECT' && isMultiple) {
      const selected = Array.from(input.selectedOptions).map(o => o.value);
      value = selected.length ? ['L', ...selected] : null;
    } else if (input.tagName === 'SELECT') {
      value = input.value === '' ? null : input.value;
      // Reference columns store numeric id
      if (gristType && gristType.startsWith('Ref:') && value !== null) {
        value = Number(value);
      }
    } else if (input.type === 'number') {
      value = input.value === '' ? null : Number(input.value);
    } else if (input.type === 'date' || input.type === 'datetime-local') {
      if (input.value === '') {
        value = null;
      } else {
        // Grist expects Unix timestamp (seconds) for Date/DateTime
        value = Math.floor(new Date(input.value).getTime() / 1000);
      }
    } else {
      value = input.value === '' ? null : input.value;
    }

    if (value !== null && value !== undefined) {
      data[id] = value;
    }
  }

  return data;
}

// ── Submit ─────────────────────────────────────────────────────────────────
document.getElementById('btn-submit').addEventListener('click', async () => {
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('msg');
  msg.className = '';
  msg.style.display = 'none';
  btn.disabled = true;

  try {
    // Validation complète avant envoi
    const valid = validateAll();
    log('Validation :', valid ? '✓ OK' : '✗ Erreurs détectées');
    if (!valid) {
      showMsg('err', '⚠️ Corrigez les erreurs avant d\'envoyer.');
      btn.disabled = false;
      return;
    }

    const data = collectValues();
    log('Soumission dans', currentTable, ':', data);

    if (!currentTable) throw new Error('Table cible inconnue');

    await grist.docApi.applyUserActions([
      ['AddRecord', currentTable, null, data]
    ]);

    log('✓ Enregistrement ajouté');
    showMsg('ok', '✓ Enregistrement ajouté avec succès');

    // Reset
    document.querySelectorAll('[data-field-id]').forEach(input => {
      if (input.type === 'checkbox') input.checked = false;
      else input.value = '';
    });
    // Effacer les erreurs résiduelles
    document.querySelectorAll('.field-error.visible').forEach(el => {
      el.classList.remove('visible');
      document.getElementById(el.id.replace('error-', 'field-'))
              ?.classList.remove('invalid');
    });

  } catch(e) {
    log('✗ Erreur soumission:', e.message);
    showMsg('err', friendlyError(e));
  } finally {
    btn.disabled = false;
  }
});

// ── Message helpers ────────────────────────────────────────────────────────
function showMsg(type, text) {
  const msg = document.getElementById('msg');
  msg.style.display = 'block'; // forcer au cas où un style inline traîne
  msg.className = type;
  msg.textContent = text;
  if (type === 'ok') {
    setTimeout(() => { msg.style.display = 'none'; msg.className = ''; }, 3500);
  }
  // Les erreurs restent affichées jusqu'à la prochaine action
}

// Transforme l'erreur brute en message lisible
function friendlyError(e) {
  const raw = e?.message ?? String(e);

  if (raw.includes('Table not found') || raw.includes('No table'))
    return '❌ Table introuvable. Vérifiez la configuration du widget.';
  if (raw.includes('Permission') || raw.includes('403') || raw.includes('Access'))
    return '❌ Permission refusée. Le widget nécessite l\'accès "full".';
  if (raw.includes('column') || raw.includes('Column'))
    return `❌ Colonne inconnue dans la table cible.\nDétail : ${raw}`;
  if (raw.includes('Network') || raw.includes('fetch') || raw.includes('Failed to fetch'))
    return '❌ Erreur réseau. Vérifiez votre connexion.';
  if (raw.includes('Table cible inconnue'))
    return '❌ Table cible non détectée. Rechargez le widget.';

  return `❌ Erreur lors de l'envoi : ${raw}`;
}

// ── Grist init ─────────────────────────────────────────────────────────────
grist.ready({
  requiredAccess: 'full',
  columns: [
    { name: 'Colonnes', allowMultiple: true, optional: true }
  ],
});

grist.onRecords(async (records, mappings) => {
  log('onRecords — records:', records?.length, '| mappings:', mappings);

  // Detect table name
  if (mappings?.tableId) {
    currentTable = mappings.tableId;
  } else if (!currentTable && records?.length > 0) {
    // Fallback: brute-force match via metadata
    try {
      const tables  = await grist.docApi.fetchTable('_grist_Tables');
      const columns = await grist.docApi.fetchTable('_grist_Tables_column');
      const sampleKeys = Object.keys(records[0]).filter(k => k !== 'id');
      for (let t = 0; t < tables.tableId.length; t++) {
        const tRef  = tables.id[t];
        const tCols = columns.colId.filter((_, i) => columns.parentId[i] === tRef);
        if (sampleKeys.length > 0 && sampleKeys.every(k => tCols.includes(k))) {
          currentTable = tables.tableId[t];
          log('Table détectée par intersection :', currentTable);
          break;
        }
      }
    } catch(e) { log('Erreur détection table:', e.message); }
  }

  log('Table courante :', currentTable);

  // Extract visible columns
  let visibleCols = [];
  if (mappings?.Colonnes) {
    visibleCols = Array.isArray(mappings.Colonnes) ? mappings.Colonnes : [mappings.Colonnes];
  } else if (records?.length > 0) {
    visibleCols = Object.keys(records[0]).filter(k => k !== 'id');
  }

  log('Colonnes visibles :', visibleCols);

  if (!visibleCols.length) {
    document.getElementById('form-title').textContent = 'Aucune colonne sélectionnée';
    document.getElementById('form-fields').innerHTML = '';
    document.getElementById('btn-submit').disabled = true;
    return;
  }

  if (!currentTable) {
    log('Table inconnue, impossible de construire le schéma');
    return;
  }

  // Build schema + render
  schema = await buildSchema(currentTable, visibleCols);
  await grist.setOption('formSchema', schema);
  log('Schéma sauvegardé dans les options widget :', schema.length, 'champs');

  renderForm(schema, currentTable);
});

log('Widget initialisé');
</script>
</body>
</html>
